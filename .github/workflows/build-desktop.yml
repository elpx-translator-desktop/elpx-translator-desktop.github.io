name: Build Desktop

on:
    workflow_dispatch:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    build-linux:
        runs-on: ubuntu-22.04

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libegl1 libxkbcommon-x11-0 libdbus-1-3 wget

            - name: Install Python dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install -e .[build]

            - name: Detect app version
              id: version
              run: |
                  APP_VERSION="$(python3 - <<'PY'
                  import sys
                  sys.path.insert(0, 'src')
                  from elpx_translator_desktop import __version__
                  print(__version__)
                  PY
                  )"
                  echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Download appimagetool
              run: |
                  wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
                  chmod +x appimagetool-x86_64.AppImage

            - name: Build Linux artifacts
              run: |
                  GLIBC_BASELINE=2.35 APPIMAGE_TOOL="./appimagetool-x86_64.AppImage --appimage-extract-and-run" ./packaging/linux/build-linux-artifacts.sh

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: elpx-translator-desktop-linux
                  path: |
                      elpx-translator-desktop_${{ steps.version.outputs.app_version }}_*.deb
                      elpx-translator-desktop-${{ steps.version.outputs.app_version }}-*.AppImage

            - name: Attach release asset
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      elpx-translator-desktop_${{ steps.version.outputs.app_version }}_*.deb
                      elpx-translator-desktop-${{ steps.version.outputs.app_version }}-*.AppImage

    build-windows:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install Python dependencies
              shell: bash
              run: |
                  python -m pip install --upgrade pip
                  pip install -e .[build]

            - name: Detect app version
              id: version
              shell: bash
              run: |
                  APP_VERSION="$(python3 - <<'PY'
                  import sys
                  sys.path.insert(0, 'src')
                  from elpx_translator_desktop import __version__
                  print(__version__)
                  PY
                  )"
                  echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build app
              shell: bash
              run: |
                  pyinstaller --name ELPXTranslatorDesktop --windowed --noconfirm --clean --add-data "src/elpx_translator_desktop/assets;elpx_translator_desktop/assets" src/elpx_translator_desktop/app.py

            - name: Install Inno Setup
              shell: powershell
              run: choco install innosetup --no-progress --yes

            - name: Build installer
              shell: powershell
              run: |
                  New-Item -ItemType Directory -Force -Path dist-installer | Out-Null
                  & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "/DMyAppVersion=${{ steps.version.outputs.app_version }}" "/DMyAppSource=$env:GITHUB_WORKSPACE\dist\ELPXTranslatorDesktop" "/DMyOutputDir=$env:GITHUB_WORKSPACE\dist-installer" "packaging\windows\installer.iss"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: elpx-translator-desktop-windows-exe
                  path: dist-installer/elpx-translator-desktop-windows-${{ steps.version.outputs.app_version }}.exe

            - name: Attach release asset
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: dist-installer/elpx-translator-desktop-windows-${{ steps.version.outputs.app_version }}.exe

    build-macos:
        runs-on: macos-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install Python dependencies
              run: |
                  python3 -m pip install --upgrade pip
                  pip install -e .[build]

            - name: Detect app version
              id: version
              run: |
                  APP_VERSION="$(python3 - <<'PY'
                  import sys
                  sys.path.insert(0, 'src')
                  from elpx_translator_desktop import __version__
                  print(__version__)
                  PY
                  )"
                  echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

            - name: Build app
              run: |
                  pyinstaller --name ELPXTranslatorDesktop --windowed --noconfirm --clean --add-data "src/elpx_translator_desktop/assets:elpx_translator_desktop/assets" src/elpx_translator_desktop/app.py

            - name: Build DMG
              run: |
                  APP_VERSION="${{ steps.version.outputs.app_version }}"
                  hdiutil create -volname "ELPX Translator Desktop" -srcfolder "dist/ELPXTranslatorDesktop.app" -ov -format UDZO "elpx-translator-desktop-macos-${APP_VERSION}.dmg"

            - name: Upload build artifact
              uses: actions/upload-artifact@v4
              with:
                  name: elpx-translator-desktop-macos-dmg
                  path: elpx-translator-desktop-macos-${{ steps.version.outputs.app_version }}.dmg

            - name: Attach release asset
              if: github.event_name == 'release'
              uses: softprops/action-gh-release@v2
              with:
                  files: elpx-translator-desktop-macos-${{ steps.version.outputs.app_version }}.dmg
