name: Build Desktop

on:
    workflow_dispatch:
    release:
        types: [published]

permissions:
    contents: write

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      artifact_name: elpx-translator-desktop-linux
                      archive_name: elpx-translator-desktop-linux
                    - os: windows-latest
                      artifact_name: elpx-translator-desktop-windows
                      archive_name: elpx-translator-desktop-windows
                    - os: macos-latest
                      artifact_name: elpx-translator-desktop-macos
                      archive_name: elpx-translator-desktop-macos

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: '3.11'

            - name: Install Linux system dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y libegl1 libxkbcommon-x11-0 libdbus-1-3

            - name: Install Python dependencies
              run: |
                  python -m pip install --upgrade pip
                  pip install -e .[build]

            - name: Build app
              run: |
                  pyinstaller --name ELPXTranslatorDesktop --windowed --noconfirm --clean src/elpx_translator_desktop/app.py

            - name: Archive Linux artifact
              if: runner.os == 'Linux'
              run: |
                  cd dist
                  tar -czf ../${{ matrix.archive_name }}.tar.gz ELPXTranslatorDesktop

            - name: Archive macOS artifact
              if: runner.os == 'macOS'
              run: |
                  cd dist
                  ditto -c -k --sequesterRsrc --keepParent ELPXTranslatorDesktop.app ../${{ matrix.archive_name }}.zip

            - name: Archive Windows artifact
              if: runner.os == 'Windows'
              shell: pwsh
              run: |
                  Compress-Archive -Path dist/ELPXTranslatorDesktop/* -DestinationPath ${{ matrix.archive_name }}.zip

            - name: Upload build artifact
              if: runner.os == 'Linux'
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: ${{ matrix.archive_name }}.tar.gz

            - name: Attach artifacts to release
              if: github.event_name == 'release' && runner.os == 'Linux'
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ matrix.archive_name }}.tar.gz

            - name: Upload build artifact
              if: runner.os == 'Windows' || runner.os == 'macOS'
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ matrix.artifact_name }}
                  path: ${{ matrix.archive_name }}.zip

            - name: Attach artifacts to release
              if: github.event_name == 'release' && (runner.os == 'Windows' || runner.os == 'macOS')
              uses: softprops/action-gh-release@v2
              with:
                  files: ${{ matrix.archive_name }}.zip
